<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>NEBULA DRILL — Cosmic Crash Mining</title>
    <style>
        * {
            user-select: none;
            -webkit-tap-highlight-color: transparent;
            box-sizing: border-box;
        }

        body {
            background: radial-gradient(ellipse at 30% 40%, #0a0718, #02010a);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', 'Orbitron', 'Rajdhani', monospace;
            margin: 0;
            padding: 20px;
        }

        /* main game panel — different glassmorphic style */
        .game-container {
            max-width: 760px;
            width: 100%;
            background: rgba(5, 8, 22, 0.7);
            backdrop-filter: blur(12px);
            border-radius: 48px;
            padding: 24px 26px 32px;
            box-shadow: 0 30px 40px rgba(0, 0, 0, 0.6), inset 0 1px 0 rgba(210, 180, 255, 0.2);
            border: 1px solid rgba(130, 80, 220, 0.4);
            transition: all 0.2s;
        }

        /* header with asteroid / multiplier fusion */
        .multiplier-area {
            text-align: center;
            margin-bottom: 1rem;
            position: relative;
        }

        .current-multiplier {
            font-size: 5.2rem;
            font-weight: 900;
            letter-spacing: 6px;
            background: linear-gradient(135deg, #E0C8FF, #A855F7, #7C3AED);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-shadow: 0 0 18px rgba(168, 85, 247, 0.5);
            font-family: 'Orbitron', monospace;
        }

        .depth-meter {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            background: #0e0a1fe0;
            padding: 6px 18px;
            border-radius: 60px;
            font-size: 0.85rem;
            font-weight: 500;
            color: #c4b5fd;
            margin-top: 6px;
            backdrop-filter: blur(4px);
            border: 1px solid #7e5bef40;
        }

        /* canvas: "mining depth scanner" */
        .canvas-wrapper {
            background: #030018;
            border-radius: 40px;
            padding: 8px;
            box-shadow: 0 12px 28px #00000066, inset 0 0 0 1px #5b3cc4;
            margin: 12px 0 20px;
        }

        canvas {
            display: block;
            width: 100%;
            background: #010006;
            border-radius: 32px;
            cursor: pointer;
            height: auto;
        }

        /* 3-panel info: fuel (balance), stress (potential), last find */
        .info-panel {
            display: flex;
            justify-content: space-between;
            gap: 12px;
            margin: 20px 0 12px;
            background: #03000faa;
            padding: 14px 20px;
            border-radius: 48px;
            backdrop-filter: blur(8px);
            flex-wrap: wrap;
        }

        .info-card {
            flex: 1;
            text-align: center;
            background: rgba(0, 0, 0, 0.5);
            border-radius: 32px;
            padding: 8px 6px;
        }

        .fuel-label, .stress-label, .last-label {
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: #8b7ac9;
        }

        .fuel-value, .stress-value, .last-value {
            font-size: 1.7rem;
            font-weight: 800;
            color: #ffe6b3;
            font-family: monospace;
        }

        /* Bet control - mining rig investment */
        .drill-control {
            background: #08041cd9;
            border-radius: 56px;
            padding: 12px 18px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 12px;
            margin: 16px 0;
            border: 1px solid #4540aa40;
        }

        .invest-area {
            display: flex;
            align-items: center;
            gap: 10px;
            background: #01000c;
            padding: 4px 20px;
            border-radius: 60px;
        }

        .invest-area label {
            font-weight: 600;
            color: #b7a6ff;
        }

        #drillPower {
            background: transparent;
            border: none;
            font-size: 1.4rem;
            font-weight: 700;
            width: 100px;
            color: #facc15;
            outline: none;
            font-family: monospace;
        }

        .preset-buttons {
            display: flex;
            gap: 10px;
        }

        .preset {
            background: #1f1a3a;
            border: none;
            font-weight: bold;
            padding: 6px 14px;
            border-radius: 40px;
            color: #cdc2ff;
            cursor: pointer;
            transition: 0.08s linear;
            font-family: monospace;
        }

        .preset:active {
            transform: scale(0.94);
            background: #443c74;
        }

        .action-buttons {
            display: flex;
            gap: 18px;
            margin: 18px 0 12px;
        }

        .action-btn {
            flex: 1;
            padding: 14px 0;
            font-weight: 800;
            font-size: 1.2rem;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: 0.08s linear;
            font-family: 'Rajdhani', monospace;
            letter-spacing: 1.5px;
        }

        .drill-btn {
            background: linear-gradient(95deg, #4f46e5, #7c3aed);
            box-shadow: 0 6px 0 #2e1a6b;
            color: white;
        }

        .extract-btn {
            background: linear-gradient(95deg, #eab308, #ca8a04);
            box-shadow: 0 6px 0 #7a550a;
            color: #1e1a0a;
        }

        .action-btn:active {
            transform: translateY(2px);
            box-shadow: 0 2px 0 #00000066;
        }

        .action-btn:disabled {
            opacity: 0.5;
            transform: none;
            cursor: not-allowed;
            filter: grayscale(0.2);
        }

        /* disaster log (history but different name) */
        .excavation-log {
            margin-top: 24px;
            background: #020014b3;
            border-radius: 40px;
            padding: 12px 18px;
            backdrop-filter: blur(4px);
        }

        .log-title {
            font-size: 0.7rem;
            letter-spacing: 3px;
            color: #a593fc;
            margin-bottom: 8px;
        }

        .log-list {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            align-items: center;
        }

        .log-entry {
            background: #18122e;
            padding: 5px 16px;
            border-radius: 36px;
            font-weight: 700;
            font-size: 0.9rem;
            color: #ffd966;
            font-family: monospace;
            border-left: 3px solid #facc15;
        }

        .warning-sign {
            font-size: 0.75rem;
            background: #4c1d95;
            display: inline-block;
            padding: 4px 14px;
            border-radius: 60px;
            margin-top: 6px;
        }

        @media (max-width: 550px) {
            .current-multiplier {
                font-size: 3.6rem;
            }
            .fuel-value {
                font-size: 1.3rem;
            }
        }
    </style>
</head>
<body>
<div class="game-container">
    <div class="multiplier-area">
        <div class="current-multiplier" id="depthMultiplier">1.00x</div>
        <div class="depth-meter">
            <span>🌀 DRILL DEPTH</span>
            <span id="drillStatusIcon">⚙️ IDLE</span>
        </div>
    </div>

    <div class="canvas-wrapper">
        <canvas id="miningCanvas" width="720" height="360" style="width:100%; height:auto; max-width:720px; aspect-ratio:720/360"></canvas>
    </div>

    <div class="info-panel">
        <div class="info-card">
            <div class="fuel-label">⛏️ FUEL CELLS (BALANCE)</div>
            <div class="fuel-value" id="balanceValue">2500</div>
        </div>
        <div class="info-card">
            <div class="stress-label">⚡ POTENTIAL ORE</div>
            <div class="stress-value" id="potentialOre">0</div>
        </div>
        <div class="info-card">
            <div class="last-label">💎 LAST HAUL</div>
            <div class="last-value" id="lastExtract">—</div>
        </div>
    </div>

    <div class="drill-control">
        <div class="invest-area">
            <label>⚙️ INVEST FUEL</label>
            <input type="number" id="drillPower" value="20" step="5" min="1" max="1000">
        </div>
        <div class="preset-buttons">
            <button class="preset" data-add="10">+10</button>
            <button class="preset" data-add="25">+25</button>
            <button class="preset" data-add="50">+50</button>
            <button class="preset" data-add="100">+100</button>
        </div>
    </div>

    <div class="action-buttons">
        <button class="action-btn drill-btn" id="startDrillBtn">🪨 START DRILLING</button>
        <button class="action-btn extract-btn" id="extractOreBtn" disabled>💎 EXTRACT / CASHOUT</button>
    </div>

    <div class="excavation-log">
        <div class="log-title">📡 EXCAVATION LOG (CRASH POINTS)</div>
        <div class="log-list" id="logList">
            <span style="color:#6b5b9b;">— no seismic events —</span>
        </div>
    </div>
</div>

<script>
    (function() {
        // ----- DIFFERENT MECHANICS ----
        // Instead of pure multiplier betting, we simulate a drilling rig that goes deeper (multiplier rises)
        // but it can "hit a seismic shock" (crash) at any depth. The risk increases with depth.
        // Players invest fuel (bet), and can extract (cashout) at any depth to convert fuel * depth multiplier to balance.
        // Key difference: the crash probability increases non-linearly the deeper you go, and you can also see "stress" meter.
        // Also uses random event 'cave-in' at random point but more suspense: multiplier accelerates faster after certain depth.
        
        // DOM elements
        const canvas = document.getElementById('miningCanvas');
        const ctx = canvas.getContext('2d');
        const depthMultiplierSpan = document.getElementById('depthMultiplier');
        const drillStatusSpan = document.getElementById('drillStatusIcon');
        const balanceSpan = document.getElementById('balanceValue');
        const potentialSpan = document.getElementById('potentialOre');
        const lastExtractSpan = document.getElementById('lastExtract');
        const drillInput = document.getElementById('drillPower');
        const startDrillBtn = document.getElementById('startDrillBtn');
        const extractBtn = document.getElementById('extractOreBtn');
        const logList = document.getElementById('logList');
        
        // state
        let balance = 2500;            // fuel cells
        let currentInvestment = 0;     // active invested fuel (bet)
        let isDrilling = false;         // round active (depth rising)
        let hasExtracted = false;       // prevent double extraction
        let currentDepthMultiplier = 1.00;
        let caveInPoint = 1.00;         // the depth where disaster strikes (random)
        let animationId = null;
        let drillStartTime = 0;
        let lastExtractValue = 0;
        let disasterHistory = [];       // store crash points (max 10)
        
        // canvas dimens
        let canvasWidth = 720;
        let canvasHeight = 360;
        
        // helper
        function resizeCanvas() {
            const container = canvas.parentElement;
            const w = container.clientWidth;
            canvas.width = Math.min(720, w - 16);
            canvas.height = canvas.width * (360/720);
            canvasWidth = canvas.width;
            canvasHeight = canvas.height;
            drawDepthCurve();
        }
        window.addEventListener('resize', () => { resizeCanvas(); drawDepthCurve(); });
        
        // update UI 
        function updateUI() {
            balanceSpan.innerText = Math.floor(balance);
            if (isDrilling && currentInvestment > 0 && !hasExtracted) {
                let potential = currentInvestment * currentDepthMultiplier;
                potentialSpan.innerText = Math.floor(potential);
            } else {
                potentialSpan.innerText = "0";
            }
            if (currentInvestment > 0 && isDrilling && !hasExtracted && currentDepthMultiplier > 1.05) {
                extractBtn.disabled = false;
            } else {
                extractBtn.disabled = true;
            }
            if (!isDrilling && currentInvestment === 0) {
                extractBtn.disabled = true;
            }
            if (currentDepthMultiplier > 1) {
                drillStatusSpan.innerHTML = `📈 DEPTH: ${currentDepthMultiplier.toFixed(2)}x`;
            } else {
                drillStatusSpan.innerHTML = isDrilling ? "🔄 BORING..." : "⏸️ STANDBY";
            }
        }
        
        // seismic event (crash) record
        function addSeismicEvent(crashDepth) {
            disasterHistory.unshift(crashDepth.toFixed(2) + 'x');
            if (disasterHistory.length > 10) disasterHistory.pop();
            renderLog();
        }
        
        function renderLog() {
            logList.innerHTML = '';
            if (disasterHistory.length === 0) {
                logList.innerHTML = '<span style="color:#6b5b9b;">— no seismic events —</span>';
                return;
            }
            disasterHistory.forEach(ev => {
                const entry = document.createElement('div');
                entry.className = 'log-entry';
                entry.innerText = `💥 ${ev}`;
                logList.appendChild(entry);
            });
        }
        
        // generate cave-in depth point (crash point) -> uses exponential distribution but different range: 1.1x to 8.5x mostly, occasional high
        function generateCaveInDepth() {
            let r = Math.random();
            // custom distribution: heavy chance between 1.3 and 4.5, extremes rare, min 1.12
            let raw = 1.1 + Math.pow(r, 1.6) * 12;
            let depth = Math.min(18.0, Math.max(1.12, raw));
            return Math.floor(depth * 100) / 100;
        }
        
        // drawing the mining depth curve with "stress zone" visualization
        function drawDepthCurve() {
            if (!ctx) return;
            ctx.clearRect(0, 0, canvasWidth, canvasHeight);
            ctx.fillStyle = '#02000c';
            ctx.fillRect(0, 0, canvasWidth, canvasHeight);
            
            // grid lines
            ctx.beginPath();
            ctx.strokeStyle = '#342a6e';
            ctx.lineWidth = 0.6;
            for (let i = 0; i <= 4; i++) {
                let y = canvasHeight - (i / 4) * canvasHeight;
                ctx.moveTo(0, y);
                ctx.lineTo(canvasWidth, y);
                ctx.stroke();
            }
            // draw theoretical depth curve (risk curve)
            let maxDepth = (isDrilling && currentDepthMultiplier > 1) ? Math.max(currentDepthMultiplier, 2.5) : (caveInPoint > 1 ? caveInPoint : 3.5);
            if (!isDrilling && currentDepthMultiplier > 1) maxDepth = currentDepthMultiplier;
            if (maxDepth < 1.5) maxDepth = 3.0;
            const points = [];
            for (let px = 0; px <= canvasWidth; px += 5) {
                let t = px / canvasWidth; // 0..1
                let depthVal = 1 + (maxDepth - 1) * (1 - Math.pow(1 - t, 1.5));
                let y = canvasHeight - (Math.min(depthVal, maxDepth) / maxDepth) * canvasHeight;
                points.push({x: px, y: y});
            }
            ctx.beginPath();
            ctx.strokeStyle = '#f0a34b';
            ctx.lineWidth = 3;
            ctx.shadowBlur = 0;
            for (let i=0; i<points.length; i++) {
                if (i===0) ctx.moveTo(points[i].x, points[i].y);
                else ctx.lineTo(points[i].x, points[i].y);
            }
            ctx.stroke();
            
            // danger zone (red hatch)
            if (maxDepth > 2.5) {
                ctx.globalAlpha = 0.3;
                ctx.fillStyle = "#ff3366";
                let dangerStartY = canvasHeight - (2.5 / maxDepth) * canvasHeight;
                ctx.fillRect(0, dangerStartY, canvasWidth, canvasHeight - dangerStartY);
                ctx.globalAlpha = 1.0;
            }
            
            // animated drill bit (current depth)
            if (isDrilling && currentDepthMultiplier >= 1) {
                let tPos = Math.min(1, (currentDepthMultiplier - 1) / (maxDepth - 1));
                let dotX = canvasWidth * tPos;
                let depthShow = 1 + (maxDepth - 1) * (1 - Math.pow(1 - tPos, 1.5));
                let dotY = canvasHeight - (Math.min(depthShow, maxDepth) / maxDepth) * canvasHeight;
                ctx.beginPath();
                ctx.fillStyle = '#ffb347';
                ctx.arc(dotX, dotY, 10, 0, Math.PI*2);
                ctx.fill();
                ctx.beginPath();
                ctx.fillStyle = '#ffe484';
                ctx.arc(dotX, dotY, 5, 0, Math.PI*2);
                ctx.fill();
            }
            
            if (!isDrilling && caveInPoint > 1 && !hasExtracted && currentInvestment === 0) {
                ctx.font = "bold 22px monospace";
                ctx.fillStyle = "#ff8866";
                ctx.shadowBlur = 0;
                ctx.fillText("🪨 CAVE-IN!", canvasWidth-120, 55);
            }
        }
        
        // seismic collapse (crash)
        function causeCaveIn() {
            if (!isDrilling) return;
            if (animationId) cancelAnimationFrame(animationId);
            isDrilling = false;
            // If player didn't extract and had investment -> lost investment
            if (currentInvestment > 0 && !hasExtracted) {
                // loss: no refund
                drillStatusSpan.innerHTML = `💥 CAVE-IN at ${caveInPoint.toFixed(2)}x depth · Lost ${currentInvestment} fuel`;
                currentInvestment = 0;
            } else if (currentInvestment > 0 && hasExtracted) {
                drillStatusSpan.innerHTML = `✅ SAFE EXTRACTION at ${currentDepthMultiplier.toFixed(2)}x | Drill collapsed afterward`;
                currentInvestment = 0;
            } else {
                drillStatusSpan.innerHTML = `💀 DRILL DESTROYED at ${caveInPoint.toFixed(2)}x`;
            }
            addSeismicEvent(caveInPoint);
            hasExtracted = false;
            currentDepthMultiplier = 1.00;
            depthMultiplierSpan.innerText = "1.00x";
            updateUI();
            drawDepthCurve();
            // auto restart after 4.5 seconds idle
            setTimeout(() => {
                if (!isDrilling && currentInvestment === 0 && !animationId) {
                    // idle - ready for next drill start
                    drillStatusSpan.innerHTML = "🟢 READY TO DRILL";
                }
            }, 2000);
        }
        
        // start drilling (round)
        function startDrilling() {
            if (isDrilling) {
                drillStatusSpan.innerHTML = "⚠️ Already drilling deep!";
                return;
            }
            let investAmount = parseFloat(drillInput.value);
            if (isNaN(investAmount) || investAmount <= 0) investAmount = 10;
            if (investAmount > balance) {
                drillStatusSpan.innerHTML = "❌ Not enough fuel cells!";
                return;
            }
            if (investAmount < 1) investAmount = 1;
            // deduct investment
            balance -= investAmount;
            currentInvestment = investAmount;
            hasExtracted = false;
            // generate new random cave-in point (unique each drill)
            caveInPoint = generateCaveInDepth();
            currentDepthMultiplier = 1.00;
            depthMultiplierSpan.innerText = "1.00x";
            isDrilling = true;
            drillStartTime = performance.now();
            updateUI();
            drawDepthCurve();
            // start animation loop with modified acceleration (faster deeper = more suspense)
            if (animationId) cancelAnimationFrame(animationId);
            function depthLoop(now) {
                if (!isDrilling) return;
                let elapsed = (now - drillStartTime) / 1000;
                // acceleration curve: multiplier = 1 + (caveInPoint-1) * (elapsed / 11)^1.9, max duration 10 sec
                let t = Math.min(1, elapsed / 9.8);
                let eased = Math.pow(t, 1.4);
                let mult = 1 + (caveInPoint - 1) * eased;
                if (mult >= caveInPoint || elapsed >= 10.5) {
                    currentDepthMultiplier = caveInPoint;
                    depthMultiplierSpan.innerText = caveInPoint.toFixed(2) + "x";
                    causeCaveIn();
                    return;
                }
                currentDepthMultiplier = parseFloat(mult.toFixed(4));
                depthMultiplierSpan.innerText = currentDepthMultiplier.toFixed(2) + "x";
                if (currentInvestment > 0 && !hasExtracted) {
                    let potential = currentInvestment * currentDepthMultiplier;
                    potentialSpan.innerText = Math.floor(potential);
                }
                updateUI();
                drawDepthCurve();
                animationId = requestAnimationFrame(depthLoop);
            }
            animationId = requestAnimationFrame(depthLoop);
            drillStatusSpan.innerHTML = `🛠️ DRILLING to unknown depth...`;
        }
        
        // Extract ore (cashout)
        function extractOre() {
            if (!isDrilling) {
                drillStatusSpan.innerHTML = "No active drilling operation!";
                return;
            }
            if (currentInvestment <= 0) {
                drillStatusSpan.innerHTML = "No fuel invested to extract!";
                return;
            }
            if (hasExtracted) {
                drillStatusSpan.innerHTML = "Already extracted this vein!";
                return;
            }
            if (currentDepthMultiplier <= 1.02) {
                drillStatusSpan.innerHTML = "Depth too shallow, drill deeper (min 1.05x)";
                return;
            }
            // extraction success
            let reward = currentInvestment * currentDepthMultiplier;
            balance += reward;
            lastExtractValue = reward;
            lastExtractSpan.innerText = Math.floor(reward);
            drillStatusSpan.innerHTML = `💎 EXTRACTED ${Math.floor(reward)} ore at ${currentDepthMultiplier.toFixed(2)}x depth!`;
            hasExtracted = true;
            currentInvestment = 0;
            updateUI();
            drawDepthCurve();
            extractBtn.disabled = true;
            // after extraction we immediately finish? No, we allow drilling to still go on until crash, but we have no active investment.
            // but we still show depth rising for suspense, however no balance impact. We keep animation but no potential.
            potentialSpan.innerText = "0";
            // If player extracted, they are safe, but round still active for others? This is single player, round ends after crash anyway.
            // But we keep drill active until cave-in, but no bet; no further action.
        }
        
        // preset chips
        document.querySelectorAll('.preset').forEach(btn => {
            btn.addEventListener('click', () => {
                let addVal = parseFloat(btn.getAttribute('data-add'));
                let currentVal = parseFloat(drillInput.value);
                let newVal = currentVal + addVal;
                if (newVal > balance && !isDrilling) newVal = balance;
                if (newVal < 1) newVal = 1;
                drillInput.value = Math.floor(newVal);
            });
        });
        
        drillInput.addEventListener('change', () => {
            let v = parseFloat(drillInput.value);
            if (isNaN(v)) drillInput.value = 20;
            else if (v < 1) drillInput.value = 1;
            else if (v > 5000) drillInput.value = 5000;
            else drillInput.value = Math.floor(v);
        });
        
        startDrillBtn.addEventListener('click', startDrilling);
        extractBtn.addEventListener('click', extractOre);
        
        function initGame() {
            resizeCanvas();
            drawDepthCurve();
            updateUI();
            lastExtractSpan.innerText = "—";
            drillStatusSpan.innerHTML = "⭐ PLACE FUEL & START DRILL";
            isDrilling = false;
            currentInvestment = 0;
            currentDepthMultiplier = 1.00;
            hasExtracted = false;
            depthMultiplierSpan.innerText = "1.00x";
            caveInPoint = 1.88;
            disasterHistory = [];
            renderLog();
        }
        initGame();
    })();
</script>
</body>
</html>
